name: Create Docker image on new release or using manual trigger

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:

  build-arch-images:

    name: Build ${{ matrix.arch }} image
    runs-on: local-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    env:
      IMAGE_NAME: codeberg.org/${{ forgejo.repository }}

    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Login to Codeberg registry with Docker
        env:
          REGISTRY_PASSWORD: ${{ secrets.TOKEN_FOR_ACTIONS }}
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login \
            --username "${{ forgejo.repository_owner }}" \
            --password-stdin \
            codeberg.org

      - name: Publish release architecture image
        if: ${{ forgejo.event_name == 'release' }}
        run: |
          set -eu
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --network host \
            --file Dockerfile \
            --tag "${IMAGE_NAME}:${{ forgejo.ref_name }}-${{ matrix.arch }}" \
            --push \
            .

      - name: Publish development architecture image
        if: ${{ forgejo.event_name == 'workflow_dispatch' }}
        run: |
          set -eu
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --network host \
            --file Dockerfile \
            --tag "${IMAGE_NAME}:dev-${{ forgejo.sha }}-${{ matrix.arch }}" \
            --push \
            .

  publish-manifests:

    name: Publish multi-arch manifests
    runs-on: local-runner
    needs: build-arch-images
    env:
      IMAGE_NAME: codeberg.org/${{ forgejo.repository }}

    steps:
      - name: Login to Codeberg registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.TOKEN_FOR_ACTIONS }}
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login \
            --username "${{ forgejo.repository_owner }}" \
            --password-stdin \
            codeberg.org

      - name: Publish release tag manifest
        if: ${{ forgejo.event_name == 'release' }}
        env:
          RELEASE_TAG: ${{ forgejo.ref_name }}
        run: |
          set -eu
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${RELEASE_TAG}" \
            "${IMAGE_NAME}:${RELEASE_TAG}-amd64" \
            "${IMAGE_NAME}:${RELEASE_TAG}-arm64"

      - name: Publish major.minor version manifest
        if: ${{ forgejo.event_name == 'release' && !forgejo.event.release.prerelease }}
        env:
          RELEASE_TAG: ${{ forgejo.ref_name }}
        run: |
          set -eu
          if [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG=$(echo "${RELEASE_TAG}" | sed -n 's/^\(v[0-9]\+\.[0-9]\+\).*/\1/p')
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:${TAG}" \
              "${IMAGE_NAME}:${RELEASE_TAG}-amd64" \
              "${IMAGE_NAME}:${RELEASE_TAG}-arm64"
          fi

      - name: Publish latest manifest
        if: ${{ forgejo.event_name == 'release' && !forgejo.event.release.prerelease }}
        env:
          RELEASE_TAG: ${{ forgejo.ref_name }}
        run: |
          set -eu
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${RELEASE_TAG}-amd64" \
            "${IMAGE_NAME}:${RELEASE_TAG}-arm64"

      - name: Publish development manifest
        if: ${{ forgejo.event_name == 'workflow_dispatch' }}
        env:
          DEVELOPMENT_TAG: dev-${{ forgejo.sha }}
        run: |
          set -eu
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${DEVELOPMENT_TAG}" \
            "${IMAGE_NAME}:${DEVELOPMENT_TAG}-amd64" \
            "${IMAGE_NAME}:${DEVELOPMENT_TAG}-arm64"

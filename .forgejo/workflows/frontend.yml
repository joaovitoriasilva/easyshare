name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".forgejo/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".forgejo/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: local-runner
    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: https://data.forgejo.org/actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (vue-tsc)
        run: npm run type-check

      - name: Run tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

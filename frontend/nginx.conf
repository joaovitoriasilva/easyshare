limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=20r/m;

# Preserve the original request scheme through nginx. When a TLS-terminating
# proxy in front of nginx (e.g. Pangolin/Traefik, Cloudflare) sets
# X-Forwarded-Proto, use that; otherwise fall back to nginx's own scheme (the
# case when nginx itself terminates TLS or is hit directly).
map $http_x_forwarded_proto $inbound_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers, applied to every response via `always`. These are
    # inherited by the location blocks below because none of them declare their
    # own add_header (which would otherwise drop the ones set here).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    # Enable HSTS only once the site is served exclusively over HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Must be >= backend EASYSHARE_MAX_FILE_SIZE (default 100 MB) or uploads
    # will fail with 413 before reaching the backend.
    client_max_body_size 100M;

    # Forward the real client to the backend. uvicorn must run with
    # --proxy-headers --forwarded-allow-ips=<proxy> to trust these headers.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $inbound_proto;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # nginx sits behind Pangolin/Traefik (TLS-terminating reverse proxy), so
    # $remote_addr would otherwise be Traefik's own connecting IP for every
    # visitor - collapsing rate limiting (limit_req_zone above) and X-Real-IP
    # onto a single shared bucket instead of the real client. Trust Traefik's
    # X-Forwarded-For to recover the true client IP. The ranges below cover
    # typical Docker bridge/overlay networks (where Pangolin's "newt" tunnel
    # client or Traefik container reaches nginx from); narrow this to the
    # actual peer address if you can determine it (check $remote_addr in the
    # access log before enabling this).
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;

    # Stricter limit for auth endpoints (brute-force / account enumeration).
    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://backend:8000;
    }

    # General API traffic.
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        proxy_pass http://backend:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

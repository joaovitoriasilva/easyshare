# Distributed deployment example: several interchangeable EasyShare replicas
# behind a Traefik load balancer, sharing a PostgreSQL database, a Redis
# rate-limit store and a storage volume. Contrast with docker-compose.example.yml,
# which is a self-contained single node (SQLite + local disk).
#
# Copy and adapt this file; it is a template, not a turnkey production config.
# Start it with:
#
#   EASYSHARE_SECRET_KEY="$(openssl rand -hex 32)" \
#   EASYSHARE_DB_PASSWORD="$(openssl rand -hex 16)" \
#   docker compose -f docker-compose.distributed.example.yml up --build
#
# Required variables (set in your shell or a .env file):
#   EASYSHARE_SECRET_KEY   32+ char random value; it is shared by every replica
#                          so a JWT issued by one verifies on the others.
#   EASYSHARE_DB_PASSWORD  PostgreSQL password.

# Shared image definition: every replica and the one-shot migrate job run the
# same image, built once with the redis + postgres extras baked in.
x-easyshare-app: &easyshare-app
  image: easyshare-distributed:latest
  build:
    context: .
    args:
      # Bake the optional drivers this deployment needs into the image. Add "s3"
      # here as well if you switch storage to object storage (see below).
      EASYSHARE_EXTRAS: "redis,postgres"

services:
  # Reverse proxy / load balancer. It discovers the easyshare replicas through
  # Docker labels and round-robins across them, so the replicas themselves never
  # publish a host port (which would collide).
  traefik:
    image: traefik:v3.3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:8080
    ports:
      - "8080:8080"
    volumes:
      # Read-only access to the Docker socket so Traefik can watch for replicas.
      # Mounting the socket grants broad control of the host; keep this proxy on
      # a trusted host and consider a socket-proxy in production.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Shared database. SQLite cannot be shared across processes/replicas, so a
  # distributed deployment needs a server database such as PostgreSQL.
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: easyshare
      POSTGRES_PASSWORD: ${EASYSHARE_DB_PASSWORD:?set a PostgreSQL password}
      POSTGRES_DB: easyshare
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyshare -d easyshare"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Shared rate-limit store. The distributed profile refuses to start without
  # it, so per-replica in-memory limits cannot silently under-enforce.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot job: apply database migrations exactly once, before the replicas
  # start, so they never race to run `alembic upgrade head` on a fresh database.
  # Once the schema is at head, each replica's own start-up migration is a no-op.
  migrate:
    <<: *easyshare-app
    entrypoint: ["alembic", "upgrade", "head"]
    environment:
      EASYSHARE_DATABASE_URL: postgresql+psycopg://easyshare:${EASYSHARE_DB_PASSWORD:?set a PostgreSQL password}@db:5432/easyshare
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  easyshare:
    <<: *easyshare-app
    environment:
      # Production mode enforces the strong-secret start-up guard.
      EASYSHARE_ENVIRONMENT: production
      # Must be identical on every replica so JWTs verify across them.
      EASYSHARE_SECRET_KEY: ${EASYSHARE_SECRET_KEY:?set to a 32+ char random value, e.g. openssl rand -hex 32}
      # Declares a multi-replica deployment: the app refuses to start unless a
      # shared (Redis) rate-limit store is configured.
      EASYSHARE_DEPLOYMENT_PROFILE: distributed
      EASYSHARE_DATABASE_URL: postgresql+psycopg://easyshare:${EASYSHARE_DB_PASSWORD:?set a PostgreSQL password}@db:5432/easyshare
      EASYSHARE_RATE_LIMIT_STORAGE_URI: redis://redis:6379/0
      # Shared storage. On a single host, a named volume mounted into every
      # replica (see `volumes` below) is shared between them. For multi-host
      # scaling, switch to S3-compatible object storage instead: add "s3" to
      # EASYSHARE_EXTRAS above and set, e.g.:
      #   EASYSHARE_STORAGE_URI: s3://my-bucket/easyshare?region=us-east-1&endpoint_url=https://minio.example
      EASYSHARE_STORAGE_DIR: /data/storage
      EASYSHARE_ALLOW_REGISTRATION: "true"
      # Structured JSON logs for production log shippers.
      EASYSHARE_LOG_FORMAT: json
      # Trust the internal Docker network so uvicorn honours the X-Forwarded-For
      # header Traefik sets (needed for correct client IPs in rate limiting,
      # logs and the audit trail).
      EASYSHARE_FORWARDED_ALLOW_IPS: "172.16.0.0/12"
    volumes:
      - storage-data:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Run several interchangeable replicas; Traefik load-balances across them.
    deploy:
      replicas: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.easyshare.rule=PathPrefix(`/`)
      - traefik.http.routers.easyshare.entrypoints=web
      - traefik.http.services.easyshare.loadbalancer.server.port=8080
    restart: unless-stopped

volumes:
  db-data:
  storage-data:

services:
  easyshare:
    container_name: easyshare
    build: .
    environment:
      # Run in production mode so the startup guard enforces a strong secret,
      # failing fast on insecure configuration.
      EASYSHARE_ENVIRONMENT: production
      # Required: Compose refuses to start if this is unset. Use a 32+ character
      # random value, e.g. `export EASYSHARE_SECRET_KEY="$(openssl rand -hex 32)"`.
      EASYSHARE_SECRET_KEY: ${EASYSHARE_SECRET_KEY:?set to a 32+ char random value, e.g. openssl rand -hex 32}
      EASYSHARE_DATABASE_URL: sqlite:////data/easyshare.db
      EASYSHARE_STORAGE_DIR: /data/storage
      EASYSHARE_ALLOW_REGISTRATION: "true"
      # Structured JSON logs for production log shippers.
      EASYSHARE_LOG_FORMAT: json
      # If you put a reverse proxy (nginx, Traefik, Pangolin, ...) in front of
      # this container, set this to its address so uvicorn trusts the
      # X-Forwarded-For header it sets (needed for correct client IPs in rate
      # limiting/logs/audit). Left at the default (127.0.0.1, i.e. trust
      # nothing external) when the container is reachable directly.
      # EASYSHARE_FORWARDED_ALLOW_IPS: "203.0.113.10"
      EASYSHARE_FORWARDED_ALLOW_IPS: "172.16.0.0/12" # Trust all internal Docker networks (default)
      # Store files under opaque random names on disk (true, default) or readable
      # {package_id}/{file_id}_{filename} paths (false). The original filename is
      # always kept in the database regardless.
      # EASYSHARE_OBFUSCATE_STORAGE_NAMES: "true"
    volumes:
      - app-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  app-data:

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: backend

      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1

      - name: Install dependencies (locked)
        run: uv sync --frozen

      - name: Audit Python dependencies
        # Two advisories are ignored deliberately; both are off EasyShare's
        # code path:
        #   * PYSEC-2026-1325 (ecdsa): Minerva P-256 signing side channel with
        #     no upstream fix. Pulled in transitively by python-jose; EasyShare
        #     signs/verifies JWTs with HS256 (HMAC) only, so the affected ECDSA
        #     path is never exercised.
        #   * GHSA-4xgf-cpjx-pc3j (pydantic-settings): symlink escape in
        #     NestedSecretsSettingsSource / secrets_dir, neither of which
        #     EasyShare uses. Fixed in 2.14.2 and held back only by the
        #     exclude-newer cooling-off; drop this ignore once the lock picks
        #     2.14.2 up.
        run: >-
          uvx pip-audit --require-hashes --disable-pip
          -r <(uv export --frozen --no-header --no-emit-project --no-dev)
          --ignore-vuln PYSEC-2026-1325
          --ignore-vuln GHSA-4xgf-cpjx-pc3j

      - name: Lint (ruff)
        run: uv run --no-sync ruff check app tests

      - name: Type check (mypy)
        run: uv run --no-sync mypy app

      - name: Verify migrations are up to date
        run: |
          uv run --no-sync alembic upgrade head
          uv run --no-sync alembic check
        env:
          EASYSHARE_DATABASE_URL: sqlite:///./ci.db

      - name: Run tests
        run: uv run --no-sync pytest --cov=app --cov-report=term-missing
